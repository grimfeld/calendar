name: Android APK release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;27.1.12297006"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Write signing keystore from secrets
        run: |
          if [ -z "${{ secrets.ANDROID_KEYSTORE_B64 }}" ]; then
            echo "::error::ANDROID_KEYSTORE_B64 secret is not set — run the gh secret set commands (see pocketbase/README / project docs) and re-run."
            exit 1
          fi
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_B64 }}" | tr -d '\r\n ' | base64 -d > "$RUNNER_TEMP/keystore.jks" || { echo "::error::keystore secret is not valid base64"; exit 1; }
          # Strip any stray CR/LF the secrets may carry (e.g. from piping a
          # file with a trailing newline into `gh secret set`).
          PASS=$(printf '%s' "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" | tr -d '\r\n')
          ALIAS=$(printf '%s' "${{ secrets.ANDROID_KEY_ALIAS }}" | tr -d '\r\n')
          # Leak-safe diagnostics: lengths + hashes only, to compare with the
          # values on the dev machine when signing fails.
          echo "jks bytes: $(wc -c < "$RUNNER_TEMP/keystore.jks") sha: $(sha256sum "$RUNNER_TEMP/keystore.jks" | cut -c1-16)"
          echo "pass len: ${#PASS} sha: $(printf '%s' "$PASS" | sha256sum | cut -c1-16)"
          echo "alias len: ${#ALIAS} sha: $(printf '%s' "$ALIAS" | sha256sum | cut -c1-16)"
          {
            echo "storeFile=$RUNNER_TEMP/keystore.jks"
            echo "password=$PASS"
            echo "keyAlias=$ALIAS"
          } > src-tauri/gen/android/app/keystore.properties
          # Verify the keystore opens with these values before spending 10 CI
          # minutes on the build.
          keytool -list -keystore "$RUNNER_TEMP/keystore.jks" -storepass "$PASS" -alias "$ALIAS" >/dev/null || { echo "::error::keystore/password/alias mismatch"; exit 1; }
          echo "keystore verified"

      - name: Build signed APK
        run: npx tauri android build --apk --target aarch64
        env:
          NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.1.12297006
          # Released APKs talk to the fly.io PocketBase (auth-gated).
          VITE_PB_URL: https://calendar-pb.fly.dev

      - name: Rename APK
        run: |
          APK=$(find src-tauri/gen/android/app/build/outputs/apk -name "*-release.apk" | head -1)
          # Stable name so the rolling release replaces the asset instead of
          # accumulating one per commit; the release body carries the sha.
          cp "$APK" calendar.apk

      - name: Publish rolling "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest APK
          prerelease: true
          body: |
            Automated build of `${{ github.sha }}`.
            Download the APK below and install on Android (sideload).
          files: calendar.apk
